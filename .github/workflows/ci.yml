name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build -x test

      - name: Static analysis (SpotBugs)
        run: ./gradlew :collector:spotbugsMain

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Build agent fat JAR
        run: ./gradlew :agent:shadowJar

      - name: Upload agent fat JAR
        uses: actions/upload-artifact@v7
        with:
          name: cloudmeter-agent
          path: agent/build/libs/agent-*.jar
          retention-days: 30

      - name: Upload HTML coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: '**/build/reports/jacoco/test/html/'
          retention-days: 14

      - name: Upload XML coverage (for tooling)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: '**/build/reports/jacoco/test/jacocoTestReport.xml'
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/build/reports/jacoco/test/jacocoTestReport.xml'
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/build/test-results/test/*.xml'
          fail_ci_if_error: false

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

  e2e:
    name: E2E Agent Smoke Test
    runs-on: ubuntu-latest
    # Only runs after build passes — needs the fat JAR
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build agent fat JAR and smoke app
        run: ./gradlew :agent:shadowJar :test-apps:spring3:bootJar

      - name: Run e2e smoke test
        run: bash scripts/e2e.sh

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-app-log
          path: /tmp/cloudmeter-e2e-app.log
          retention-days: 3

  stress:
    name: Stress Tests
    runs-on: ubuntu-latest
    # Run stress tests separately so they don't slow the main feedback loop
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run stress tests
        # Target collector explicitly — avoids Gradle failing with "No tests found"
        # in modules that have test sources but no StressTest classes (e.g. agent).
        run: ./gradlew :collector:test --tests "*StressTest" --info
