name: CI

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build -x test

      - name: Static analysis (SpotBugs)
        run: ./gradlew :collector:spotbugsMain

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload HTML coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/build/reports/jacoco/test/html/'
          retention-days: 14

      - name: Upload XML coverage (for tooling)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: '**/build/reports/jacoco/test/jacocoTestReport.xml'
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

  stress:
    name: Stress Tests
    runs-on: ubuntu-latest
    # Run stress tests separately so they don't slow the main feedback loop
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run stress tests
        # Target collector explicitly — avoids Gradle failing with "No tests found"
        # in modules that have test sources but no StressTest classes (e.g. agent).
        run: ./gradlew :collector:test --tests "*StressTest" --info
