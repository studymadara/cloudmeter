name: Release

on:
  push:
    tags:
      - 'v*'

# ── Java agent ────────────────────────────────────────────────────────────────
jobs:
  build-agent:
    name: Build Java agent JAR
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Build agent fat JAR
        run: ./gradlew :agent:shadowJar

      - name: Rename JAR
        run: |
          TAG="${{ github.ref_name }}"
          cp agent/build/libs/agent-*.jar "cloudmeter-agent-${TAG}.jar"

      - name: Upload agent JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-jar
          path: cloudmeter-agent-${{ github.ref_name }}.jar

# ── Rust sidecar — cross-platform matrix ─────────────────────────────────────
  build-sidecar:
    name: Build sidecar — ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: sidecar-rs

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — statically linked musl binary, runs on any Linux
          - label:    linux-x86_64
            runner:   ubuntu-latest
            target:   x86_64-unknown-linux-musl
            asset:    cloudmeter-sidecar-linux-x86_64
            musl:     true
            cross:    false

          # Linux arm64 — for Raspberry Pi / Graviton / ARM cloud instances
          - label:    linux-arm64
            runner:   ubuntu-24.04-arm
            target:   aarch64-unknown-linux-musl
            asset:    cloudmeter-sidecar-linux-arm64
            musl:     true
            cross:    false

          # macOS Apple Silicon (M1/M2/M3)
          - label:    macos-arm64
            runner:   macos-latest
            target:   aarch64-apple-darwin
            asset:    cloudmeter-sidecar-macos-arm64
            musl:     false
            cross:    false

          # macOS Intel — cross-compiled from ARM runner (macos-13 unavailable on free plan)
          - label:    macos-x86_64
            runner:   macos-latest
            target:   x86_64-apple-darwin
            asset:    cloudmeter-sidecar-macos-x86_64
            musl:     false
            cross:    false

          # Windows — WSL2 and native Windows users
          - label:    windows-x86_64
            runner:   windows-latest
            target:   x86_64-pc-windows-msvc
            asset:    cloudmeter-sidecar-windows-x86_64.exe
            musl:     false
            cross:    false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux only)
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-rs/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('sidecar-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Rename binary to platform-stamped asset name
      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/cloudmeter-sidecar \
             ../${{ matrix.asset }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\cloudmeter-sidecar.exe" `
                    "..\${{ matrix.asset }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

# ── Python client — publish to PyPI ──────────────────────────────────────────
  publish-python:
    name: Publish Python client to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/python
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Stamp version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

# ── Node.js client — publish to npm ──────────────────────────────────────────
  publish-node:
    name: Publish Node.js client to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/node
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Stamp version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# ── Create GitHub Release ─────────────────────────────────────────────────────
  create-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-agent, build-sidecar, publish-python, publish-node]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Download every artifact uploaded above into ./release-assets/
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: release-assets
        run: |
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/cloudmeter-agent-${{ github.ref_name }}.jar
            release-assets/cloudmeter-sidecar-linux-x86_64
            release-assets/cloudmeter-sidecar-linux-arm64
            release-assets/cloudmeter-sidecar-macos-arm64
            release-assets/cloudmeter-sidecar-macos-x86_64
            release-assets/cloudmeter-sidecar-windows-x86_64.exe
            release-assets/sha256sums.txt
