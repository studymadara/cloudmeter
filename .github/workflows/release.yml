name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/edit releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Build agent fat JAR
        run: ./gradlew :agent:shadowJar

      - name: Rename JAR to include version tag
        # e.g. agent-0.2.0.jar → cloudmeter-agent-v0.3.0.jar so the download name is obvious
        run: |
          TAG="${{ github.ref_name }}"
          cp agent/build/libs/agent-*.jar "cloudmeter-agent-${TAG}.jar"

      - name: Create GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          files: cloudmeter-agent-${{ github.ref_name }}.jar
          generate_release_notes: true
