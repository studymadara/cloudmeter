name: CI — Rust Sidecar & Python/Node Clients

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "sidecar-rs/**"
      - "clients/python/**"
      - "clients/node/**"
      - "scripts/smoke-rust.sh"
      - "scripts/smoke-python.sh"
      - "scripts/smoke-node.sh"
      - ".github/workflows/ci-rust.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "sidecar-rs/**"
      - "clients/python/**"
      - "clients/node/**"
      - "scripts/smoke-rust.sh"
      - "scripts/smoke-python.sh"
      - "scripts/smoke-node.sh"
      - ".github/workflows/ci-rust.yml"

# ── Rust: lint ────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint (clippy + rustfmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-rs/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('sidecar-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Formatting check
        run: cargo fmt --check

# ── Python client: lint ───────────────────────────────────────────────────────
  lint-python:
    name: Lint — Python client (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check cloudmeter/

      - name: Ruff format check
        run: ruff format --check cloudmeter/

# ── Node.js client: lint ──────────────────────────────────────────────────────
  lint-node:
    name: Lint — Node.js client (eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/node

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/node/package.json

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

# ── Rust: test + coverage ─────────────────────────────────────────────────────
  test:
    name: Test & Coverage — Rust
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: sidecar-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-rs/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('sidecar-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Run tests with coverage (nextest)
        run: cargo llvm-cov nextest --profile ci --no-report

      - name: Coverage — enforce threshold (≥90% lines)
        run: cargo llvm-cov report --summary-only --fail-under-lines 90

      - name: Coverage — generate lcov for Codecov
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Coverage — generate HTML artifact
        if: always()
        run: cargo llvm-cov report --html

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-rust
          path: sidecar-rs/target/llvm-cov/html/
          retention-days: 14

      - name: Upload JUnit test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-rust
          path: sidecar-rs/target/nextest/ci/junit.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: sidecar-rs/lcov.info
          flags: rust
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: sidecar-rs/target/nextest/ci/junit.xml
          fail_ci_if_error: false

# ── Python client: test + coverage ────────────────────────────────────────────
  test-python:
    name: Test & Coverage — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: clients/python

    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e . pytest pytest-asyncio pytest-cov httpx flask "fastapi[standard]"

      - name: Run tests with coverage
        run: >-
          pytest tests/ -v --tb=short
          --cov=cloudmeter
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=80
          --junitxml=test-results.xml

      - name: Upload HTML coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: clients/python/coverage.xml
          retention-days: 14

      - name: Upload JUnit test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ matrix.python-version }}
          path: clients/python/test-results.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clients/python/coverage.xml
          flags: python-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clients/python/test-results.xml
          fail_ci_if_error: false

# ── Node.js client: test + coverage ──────────────────────────────────────────
  test-node:
    name: Test & Coverage — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: lint-node
    defaults:
      run:
        working-directory: clients/node

    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: clients/node/package.json

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Generate JUnit test results
        if: always()
        run: npm run test:junit || true

      - name: Upload lcov coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: clients/node/coverage/lcov.info
          retention-days: 14

      - name: Upload JUnit test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: clients/node/test-results.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clients/node/coverage/lcov.info
          flags: node-${{ matrix.node-version }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: clients/node/test-results.xml
          fail_ci_if_error: false

# ── Rust: build debug binary (smoke test dependency) ──────────────────────────
  build-debug:
    name: Build debug binary
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: sidecar-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-rs/target
          key: ${{ runner.os }}-cargo-debug-${{ hashFiles('sidecar-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-debug-

      - name: Build debug binary
        run: cargo build

      - name: Upload debug binary
        uses: actions/upload-artifact@v4
        with:
          name: cloudmeter-sidecar-debug-linux
          path: sidecar-rs/target/debug/cloudmeter-sidecar
          retention-days: 1

# ── E2E smoke tests ───────────────────────────────────────────────────────────
  smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-debug, test-python, test-node]

    steps:
      - uses: actions/checkout@v4

      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: cloudmeter-sidecar-debug-linux
          path: sidecar-rs/target/debug/

      - name: Make binary executable
        run: chmod +x sidecar-rs/target/debug/cloudmeter-sidecar

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python client deps
        run: pip install flask "fastapi[standard]"

      - name: Install Node.js client deps
        working-directory: clients/node
        run: npm install

      - name: Smoke — Rust sidecar
        run: bash scripts/smoke-rust.sh

      - name: Smoke — Python client (Flask)
        run: PYTHONPATH=clients/python bash scripts/smoke-python.sh

      - name: Smoke — Node.js client (Express)
        run: bash scripts/smoke-node.sh

      - name: Upload sidecar log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-smoke-logs
          path: /tmp/cloudmeter-*.log
          retention-days: 3

# ── Build verification: confirm binary compiles on macOS too ──────────────────
  build-macos:
    name: Build check — macOS
    runs-on: macos-latest
    needs: lint
    defaults:
      run:
        working-directory: sidecar-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-rs/target
          key: macos-cargo-${{ hashFiles('sidecar-rs/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build
        run: cargo build --release
