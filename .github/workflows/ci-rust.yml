name: CI — Rust Sidecar

on:
  push:
    branches: ["main", "develop"]
    paths: ["sidecar-rs/**"]
  pull_request:
    branches: ["main", "develop"]
    paths: ["sidecar-rs/**"]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sidecar-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests
        run: cargo test

      - name: Coverage report
        run: cargo llvm-cov --summary-only --fail-under-lines 90

      - name: Upload HTML coverage report
        if: always()
        run: cargo llvm-cov --html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-rust
          path: sidecar-rs/target/llvm-cov/html/
          retention-days: 14

  build-release:
    name: Build release binary (linux)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: sidecar-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-rs/target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('sidecar-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-musl-

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudmeter-sidecar-linux-x86_64
          path: sidecar-rs/target/x86_64-unknown-linux-musl/release/cloudmeter-sidecar
          retention-days: 7
